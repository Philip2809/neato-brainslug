- vacuum:
    - name: Template Neato Vacuum
      unique_id: template_neato_vacuum
      state: "{% set robot_id = 'neato_vacuum' %}
        {% set error_state = states('sensor.' ~ robot_id ~ '_robot_error') %}
        {% if is_state('binary_sensor.' ~ robot_id ~ '_ext_power_present', 'on') %}
            docked
        {% elif 'No errors' not in error_state %}
            error
        {% else %}
            unknown
        {% endif %}"

      battery_level: "{{ states('sensor.neato_vacuum_fuel_percent') | int }}"

      fan_speed: "{{ states('select.neato_vacuum_navigation_mode') }}"

      fan_speeds:
        - Normal
        - Gentle
        - Deep
        - Quick

      attributes:
        error: "{{ states('sensor.neato_vacuum_robot_error') }}"
      start:
        service: button.press
        target:
          entity_id: button.neato_vacuum_house_clean
      clean_spot:
        service: button.press
        target:
          entity_id: button.neato_vacuum_spot_clean
      pause:
        service: button.press
        target:
          entity_id: button.neato_vacuum_pause_cleaning
      stop:
        service: button.press
        target:
          entity_id: button.neato_vacuum_stop_cleaning
      return_to_base:
        service: button.press
        target:
          entity_id: button.neato_vacuum_send_to_base
      locate:
        service: button.press
        target:
          entity_id: button.neato_vacuum_locate_robot
      set_fan_speed:
        service: select.select_option
        target:
          entity_id: select.neato_vacuum_navigation_mode
        data:
          option: "{{ fan_speed }}"